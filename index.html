    }

      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%; 
      height: 180px; 
      object-fit: contain; 
      border-radius: 10px;
    }

    .nome {
      font-weight: bold;
      margin: 10px 0;
    }

    .valor {
      color: rgb(0, 185, 0);
      font-size: 18px;
      margin-bottom: 10px;
    }

    .pix {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #000;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #444;
    }

    /* NOVO - Mensagem em verde */
    .msg-presente {
      color: green;
      font-size: 14px;
      font-weight: bold;
      margin-top: 10px;
